name: Deploy zero-double-blind-core to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1) Faz checkout do repo no runner
      - name: Checkout do código
        uses: actions/checkout@v3

      # 2) Prepara a chave SSH do runner
      - name: Setup SSH key no runner
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      # 3) Copia TODO o diretório do projeto para a EC2
      - name: Copy application to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "."
          target: "/home/ec2-user/zero-double-blind-core"

      # 4) Conecta e só roda o Docker Compose na EC2
      - name: Remote deploy via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            APP_DIR=/home/ec2-user/zero-double-blind-core

            # 1) Garante diretório e entra nele
            mkdir -p $APP_DIR
            cd $APP_DIR

            # 2) Verifica se docker-compose.yml existe
            if [ ! -f docker-compose.yml ]; then
              echo "❌ docker-compose.yml não encontrado em $APP_DIR" >&2
              exit 1
            fi

            # 3) Sobe containers com Docker Compose v2
            docker compose down
            docker compose up -d --build
